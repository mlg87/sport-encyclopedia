name: Release and Deploy

on:
  push:
    branches: [main]

# Only one release run at a time. If a second push lands during a release
# we let it queue rather than cancelling — cancelling mid-release can leave
# tags out of sync with GitHub Releases.
concurrency:
  group: release-deploy
  cancel-in-progress: false

permissions:
  contents: read

# Dev-time hooks (lint-staged, commitlint) should never run in CI. Keeping
# husky's `prepare` a no-op during `npm ci` across every job.
env:
  HUSKY: '0'

jobs:
  # Combined release + deploy. semantic-release bumps package.json in the
  # runner's filesystem (but never commits it back — branch protection
  # requires PRs), then the same job builds with the bumped version baked
  # into __APP_VERSION__ and uploads to Pages. Running in a single job
  # avoids any round-trip through refs/heads/main that would trip the
  # ruleset.
  release-and-deploy:
    name: Release and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags + GitHub Releases
      issues: write # semantic-release comments on closed issues
      pull-requests: write # semantic-release comments on released PRs
      pages: write # deploy-pages
      id-token: write # deploy-pages OIDC
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for commit-analyzer to derive the next
          # version correctly; a shallow clone misreads recent commits.
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Bumps package.json in-place (no commit), creates the tag, creates
        # the GitHub Release. The bumped package.json is then read by
        # vite.config.ts at build time and injected into __APP_VERSION__.
        run: npx semantic-release

      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
